      github.com/EOSC-synergy/sqaaas-tooling flake8:
        commands:
        - /usr/bin/env sh .sqa/script.pearl_enthusiastic_squid.sh
        container: qc.sty_tundra_diligent_turkey
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.pine_thankful_shark.sh
        container: qc.sty_sienna_rational_gecko
      github.com/EOSC-synergy/sqaaas-tooling jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.obsidian_bold_chimpanzee.sh
        container: qc.sty_ice_zany_meerkat
