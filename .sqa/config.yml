config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.sleazy-rose-blue.sh
        container: qc.acc_scummy-sangria-tarsier
  QC.Doc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.dorky-flax-budgerigar.sh
        container: qc.doc_droopy-charcoal-rottweiler
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-alizarin-burmese.sh
        container: qc.doc_lumpy-maroon-hyena
      github.com/EOSC-synergy/sqaaas-tooling markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-harlequin-tamarin.sh
        container: qc.doc_wimpy-ecru-weasel
  QC.Lic:
