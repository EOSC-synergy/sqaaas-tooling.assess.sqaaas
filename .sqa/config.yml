config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-copper-jellyfish.sh
        container: qc.acc_cozy-lilac-penguin
  QC.Doc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-peach-panda.sh
        container: qc.doc_messy-wheat-raccoon
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-blue-cattle.sh
        container: qc.doc_frumpy-tangerine-cougar
      github.com/EOSC-synergy/sqaaas-tooling markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.seedy-coral-dachsbracke.sh
        container: qc.doc_crabby-teal-dog
  QC.Lic:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling licensee:
        commands:
        - /usr/bin/env sh .sqa/script.craggy-beige-dugong.sh
        container: qc.lic_boozy-eggplant-kiwi
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling bandit:
        commands:
        - /usr/bin/env sh .sqa/script.cheeky-burgundy-rottweiler.sh
        container: qc.sec_messy-periwinkle-moose
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling flake8:
        commands:
        - /usr/bin/env sh .sqa/script.zippy-thistle-dachshund.sh
        container: qc.sty_sickly-linen-retriever
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.blurry-beige-capuchin.sh
        container: qc.sty_dorky-malachite-booby
      github.com/EOSC-synergy/sqaaas-tooling jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.zippy-burgundy-scorpion.sh
        container: qc.sty_slaphappy-ultramarine-wolf
  QC.Uni:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling pytest:
        commands:
        - /usr/bin/env sh .sqa/script.chummy-cream-bee.sh
        container: qc.uni_gamy-emerald-slug
  QC.Ver:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-magnolia-bullfrog.sh
        container: qc.ver_gummy-heliotrope-butterfly
timeout: 5400
