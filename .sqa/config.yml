config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-puce-duck.sh
        container: qc.acc_squeaky-coral-mouse
  QC.Doc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.gimpy-saffron-fowl.sh
        container: qc.doc_skimpy-khaki-dragonfly
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.snappy-pink-centipede.sh
        container: qc.doc_lousy-wisteria-dormouse
      github.com/EOSC-synergy/sqaaas-tooling markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.stinky-xanthic-sparrow.sh
        container: qc.doc_blurry-pink-fousek
  QC.Lic:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling licensee:
        commands:
        - /usr/bin/env sh .sqa/script.craggy-periwinkle-fly.sh
        container: qc.lic_silly-lime-barb
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling bandit:
        commands:
        - /usr/bin/env sh .sqa/script.gummy-teal-raccoon.sh
        container: qc.sec_zippy-vermilion-neanderthal
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling flake8:
        commands:
        - /usr/bin/env sh .sqa/script.randy-indigo-chicken.sh
        container: qc.sty_wiggy-yellow-coyote
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.droopy-ruby-spitz.sh
        container: qc.sty_seedy-ivory-pig
      github.com/EOSC-synergy/sqaaas-tooling jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.flabby-turquoise-elephant.sh
        container: qc.sty_paltry-scarlet-zebra
  QC.Uni:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling pytest:
        commands:
        - /usr/bin/env sh .sqa/script.boozy-olivine-molly.sh
        container: qc.uni_lovely-flax-llama
  QC.Ver:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-copper-mist.sh
        container: qc.ver_cloudy-blue-terrier
timeout: 5400
