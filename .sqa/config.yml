config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.blurry-apricot-raccoon.sh
        container: qc.acc_flimsy-mauve-dogfish
  QC.Doc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.flabby-russet-sparrow.sh
        container: qc.doc_boozy-apricot-stingray
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.thirsty-pink-hornet.sh
        container: qc.doc_chewy-red-horse
      github.com/EOSC-synergy/sqaaas-tooling markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-amber-gecko.sh
        container: qc.doc_snappy-gold-uakari
  QC.Lic:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling licensee:
        commands:
        - /usr/bin/env sh .sqa/script.lousy-emerald-capybara.sh
        container: qc.lic_surly-coral-saola
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling bandit:
        commands:
        - /usr/bin/env sh .sqa/script.flabby-cyan-termite.sh
        container: qc.sec_frumpy-cerulean-akbash
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling flake8:
        commands:
        - /usr/bin/env sh .sqa/script.queasy-zucchini-butterfly.sh
        container: qc.sty_wheezy-emerald-bordeaux
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.gimpy-rose-armadillo.sh
        container: qc.sty_gamy-brass-dachshund
      github.com/EOSC-synergy/sqaaas-tooling jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-amber-chimpanzee.sh
        container: qc.sty_cheeky-crimson-terrier
  QC.Uni:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling pytest:
        commands:
        - /usr/bin/env sh .sqa/script.nippy-cinnabar-robin.sh
        container: qc.uni_squirrely-champagne-bird
  QC.Ver:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.sleazy-thistle-budgerigar.sh
        container: qc.ver_craggy-plum-birman
timeout: 5400
