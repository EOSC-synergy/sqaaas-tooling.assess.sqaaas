        commands:
        - /usr/bin/env sh .sqa/script.saffron_elated_termite.sh
        container: qc.sty_flint_candid_pegasus
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.pistachio_sincere_moth.sh
        container: qc.sty_sapphire_agile_cockatoo
