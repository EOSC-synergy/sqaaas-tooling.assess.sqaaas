config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.snappy-aquamarine-hornet.sh
        container: qc.acc_grumpy-indigo-seahorse
  QC.Doc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.nippy-charcoal-cat.sh
        container: qc.doc_skimpy-green-hare
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-ruby-gerbil.sh
        container: qc.doc_woolly-orchid-elephant
      github.com/EOSC-synergy/sqaaas-tooling markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-lime-scorpion.sh
        container: qc.doc_blurry-purple-tarsier
  QC.Lic:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling licensee:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-lemon-scorpion.sh
        container: qc.lic_frumpy-amaranth-loon
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling bandit:
        commands:
        - /usr/bin/env sh .sqa/script.homely-amaranth-mist.sh
        container: qc.sec_gamy-orchid-ant
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling flake8:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-yellow-mammoth.sh
        container: qc.sty_hasty-lemon-hyena
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.muzzy-violet-beagle.sh
        container: qc.sty_woolly-aqua-jellyfish
      github.com/EOSC-synergy/sqaaas-tooling jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.crabby-cerulean-clam.sh
        container: qc.sty_wiggy-sepia-vulture
  QC.Uni:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling pytest:
        commands:
        - /usr/bin/env sh .sqa/script.squirrely-vermilion-badger.sh
        container: qc.uni_skimpy-fuchsia-greyhound
  QC.Ver:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-malachite-mandrill.sh
        container: qc.ver_pretty-smalt-retriever
timeout: 5400
