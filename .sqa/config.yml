config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-champagne-lemming.sh
        container: qc.acc_flabby-grey-malamute
  QC.Doc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-purple-crane.sh
        container: qc.doc_wimpy-pear-dingo
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-violet-shark.sh
        container: qc.doc_hilly-persimmon-antelope
      github.com/EOSC-synergy/sqaaas-tooling markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-teal-insect.sh
        container: qc.doc_foggy-cardinal-butterfly
  QC.Lic:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling licensee:
        commands:
        - /usr/bin/env sh .sqa/script.pasty-coral-chinook.sh
        container: qc.lic_crabby-orange-slug
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling bandit:
        commands:
        - /usr/bin/env sh .sqa/script.snoopy-smalt-greyhound.sh
        container: qc.sec_seedy-corn-vole
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling flake8:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-amethyst-malamute.sh
        container: qc.sty_smelly-green-kangaroo
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.stuffy-crimson-bandicoot.sh
        container: qc.sty_stealthy-salmon-mandrill
      github.com/EOSC-synergy/sqaaas-tooling jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.frumpy-jade-cat.sh
        container: qc.sty_trippy-beige-zonkey
  QC.Uni:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling pytest:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-maroon-tzu.sh
        container: qc.uni_sleepy-vermilion-indri
  QC.Ver:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-ecru-frog.sh
        container: qc.ver_shabby-firebrick-hound
timeout: 5400
