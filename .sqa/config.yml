        - /usr/bin/env sh .sqa/script.chartreuse_feisty_hedgehog.sh
        container: qc.doc_wheat_jubilant_puffin
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.ruby_silly_leopard.sh
        container: qc.doc_daffodil_helpful_seahorse
      github.com/EOSC-synergy/sqaaas-tooling markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.tangerine_romantic_spren.sh
        container: qc.doc_incarnadine_foolish_squirrel
