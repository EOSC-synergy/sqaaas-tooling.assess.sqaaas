        - /usr/bin/env sh .sqa/script.gimpy-gold-harrier.sh
        container: qc.sty_gummy-olivine-mayfly
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.gloppy-lilac-chinook.sh
        container: qc.sty_goopy-chartreuse-reindeer
