config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: main
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.snippy-purple-markhor.sh
        container: qc.acc_snappy-cyan-cuscus
  QC.Doc:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-cream-echidna.sh
        container: qc.doc_bluesy-rose-chimpanzee
      github.com/EOSC-synergy/sqaaas-tooling git:
        commands:
        - /usr/bin/env sh .sqa/script.homey-wisteria-zorse.sh
        container: qc.doc_gamy-green-collie
      github.com/EOSC-synergy/sqaaas-tooling markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.chummy-russet-insect.sh
        container: qc.doc_gimpy-blue-gopher
  QC.Lic:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling licensee:
        commands:
        - /usr/bin/env sh .sqa/script.messy-lilac-ferret.sh
        container: qc.lic_silly-rose-quail
  QC.Sec:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling bandit:
        commands:
        - /usr/bin/env sh .sqa/script.scanty-mauve-shrew.sh
        container: qc.sec_foggy-sangria-coyote
  QC.Sty:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling flake8:
        commands:
        - /usr/bin/env sh .sqa/script.randy-malachite-hamster.sh
        container: qc.sty_gimpy-saffron-eagle
      github.com/EOSC-synergy/sqaaas-tooling hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-amaranth-mongrel.sh
        container: qc.sty_gummy-gamboge-balinese
      github.com/EOSC-synergy/sqaaas-tooling jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.cheeky-xanthic-akita.sh
        container: qc.sty_tasty-mauve-tapir
  QC.Uni:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling pytest:
        commands:
        - /usr/bin/env sh .sqa/script.queasy-sapphire-shrimp.sh
        container: qc.uni_hazy-chartreuse-mongrel
  QC.Ver:
    repos:
      github.com/EOSC-synergy/sqaaas-tooling get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.breezy-lime-lynx.sh
        container: qc.ver_skimpy-magenta-bulldog
timeout: 5400
